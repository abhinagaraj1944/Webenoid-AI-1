<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Webenoid AI</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link rel="stylesheet" href="taskpane.css" />
</head>

<body>
  <div class="container">

    <!-- Header -->
    <div class="header">
      <div class="logo">
         <span>Webenoid AI</span>
      </div>

      <div class="header-actions">
        <button id="openPowerBI" class="powerbi-btn">📊 Power BI</button>

        <div class="menu-wrapper">
          <span id="menuBtn" class="menu">⋮</span>
          <div id="menuDropdown" class="menu-dropdown hidden">
            <div class="menu-item" data-action="clear">Clear chat</div>
            <div class="menu-item" data-action="reset">Reset input</div>
            <div class="menu-item" data-action="help">Help</div>
            <div class="menu-item" data-action="about">About</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Chat Area -->
    <div id="resultBox" class="chat-area"></div>

    <!-- Input -->
    <div class="input-area">
      <input id="prompt" type="text" placeholder="Ask Webenoid AI anything about your Excel data…" />
      <button id="runBtn">➤</button>
    </div>

  </div>

  <script src="taskpane.js"></script>
</body>
</html>
