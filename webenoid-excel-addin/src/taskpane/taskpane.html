<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Webenoid AI</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link rel="stylesheet" href="taskpane.css" />
</head>

<body>
  <div class="container">

    <!-- Header -->
    <div class="header">
      <span>Webenoid AI</span>

      <div class="header-actions">
        <!-- Power BI Button -->
        <button id="openPowerBI" class="powerbi-btn">📊 Power BI</button>

        <!-- 3-dot Menu -->
        <div class="menu-wrapper">
          <span id="menuBtn" class="menu">⋮</span>

          <div id="menuDropdown" class="menu-dropdown hidden">
            <div class="menu-item" data-action="clear">Clear chat</div>
            <div class="menu-item" data-action="reset">Reset input</div>
            <div class="menu-item" data-action="help">Help</div>
            <div class="menu-item" data-action="about">About</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Output / Chat -->
    <div id="resultBox" class="output"></div>

    <!-- Search bar -->
    <div class="search-bar">
      <input id="prompt" type="text" placeholder="Ask Webenoid AI…" />
      <button id="runBtn">Run</button>
    </div>

  </div>

  <script src="taskpane.js"></script>
</body>
</html>
